services:
  db:
    image: mysql:8
    container_name: mysql_tracker
    environment:
      MYSQL_DATABASE: jobApplicationTracker
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: spring_tracker
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/jobApplicationTracker
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: your_secret_key_min_32_characters
    depends_on:
      - db